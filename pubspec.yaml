name: keeji
description: "课记 - 视频笔记生成工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  
  # 路由
  go_router: ^14.8.1
  
  # HTTP
  dio: ^5.7.0
  
  # 数据库
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # 文件操作
  file_picker: ^8.1.7
  
  # Markdown 渲染
  flutter_markdown: ^0.7.7
  
  # JSON 序列化
  json_annotation: ^4.9.0
  
  # 本地存储
  shared_preferences: ^2.3.5
  
  # UUID 生成
  uuid: ^4.5.1
  
  # 日期格式化
  intl: ^0.20.2
  
  # 文件分享
  share_plus: ^10.1.4
  
  # ZIP 压缩
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # 代码生成
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  
  # 图标生成
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  linux:
    generate: true
    image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color: "#ffffff"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
