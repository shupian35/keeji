name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath keji_flutter-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: keji_flutter-windows-x64.zip

  # build-macos-x64:
  #   runs-on: macos-13
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: subosito/flutter-action@v2
  #       with:
  #         flutter-version: '3.41.2'
  #         cache: true
  #     - run: flutter pub get
  #     - run: dart run build_runner build --delete-conflicting-outputs
  #     - run: flutter build macos --release
  #     - run: |
  #         hdiutil create -volname "keeji" -srcfolder build/macos/Build/Products/Release/keeji.app -ov -format UDZO keji_flutter-macos-x64.dmg
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: macos-x64
  #         path: keji_flutter-macos-x64.dmg

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - run: |
          hdiutil create -volname "keeji" -srcfolder build/macos/Build/Products/Release/keeji.app -ov -format UDZO keji_flutter-macos-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: keji_flutter-macos-arm64.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libfuse2 libmpv-dev mpv
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - run: |
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          python3 -c "
          import struct, zlib
          def create_png(width, height, color):
              raw = []
              for y in range(height):
                  raw.append(b'\x00')
                  for x in range(width):
                      raw.append(color)
              raw_data = b''.join(raw)
              def chunk(chunk_type, data):
                  c = chunk_type + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              header = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              idat = chunk(b'IDAT', zlib.compress(raw_data))
              iend = chunk(b'IEND', b'')
              return header + ihdr + idat + iend
          with open('AppDir/keeji.png', 'wb') as f:
              f.write(create_png(256, 256, b'\x3b\x82\xf6\xff'))
          "
          cd AppDir
          cat > keeji.desktop << EOF
          [Desktop Entry]
          Name=keeji
          Exec=keeji
          Type=Application
          Icon=keeji
          Categories=Utility;
          EOF
          cd ..
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --no-appstream AppDir keji_flutter-linux-x64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: keji_flutter-linux-x64.AppImage

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --release --no-codesign
      - run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r keji_flutter-ios-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: keji_flutter-ios-unsigned.ipa

  release:
    needs: [build-windows, build-macos-arm64, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/keji_flutter-windows-x64.zip
            artifacts/macos-arm64/keji_flutter-macos-arm64.dmg
            artifacts/linux/keji_flutter-linux-x64.AppImage
            artifacts/android/app-release.apk
            artifacts/ios/keji_flutter-ios-unsigned.ipa
          generate_release_notes: true
